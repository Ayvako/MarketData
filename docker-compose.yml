version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: marketdata_db
    restart: always
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: marketdata_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  api:
    image: marketdata-api
    container_name: marketdata_api
    build:
      context: .
      dockerfile: src/MarketData.Api/Dockerfile
    ports:
      - "5000:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__DefaultConnection=Host=db;Database=marketdata_db;Username=user;Password=password
      - Fintacharts__ClientId=app-cli
      - Fintacharts__ClientSecret=ВАШ_CLIENT_SECRET_ИЗ_POSTMAN
    depends_on:
      - db

volumes:
  postgres_data: